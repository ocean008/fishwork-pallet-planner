<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pallet Box Planner V3</title>
    <meta name="theme-color" content="#295f4e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pallet Planner V3" />
    <link rel="icon" href="../icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="../icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">Warehouse Tool</p>
        <h1>Pallet Box Planner</h1>
        <p class="intro">Version 3</p>
      </section>

      <section class="panel">
        <form id="planner-form" class="planner-form">
          <label for="box-count">Total boxes</label>
          <div class="input-row">
            <input
              id="box-count"
              name="box-count"
              type="number"
              inputmode="numeric"
              min="1"
              step="1"
              placeholder="e.g. 83"
              required
            />
            <button type="submit">Calculate</button>
          </div>
        </form>

        <p id="message" class="message" aria-live="polite">
          Ready to calculate.
        </p>
      </section>

      <section id="results" class="results hidden" aria-live="polite">
        <section class="plan-panel">
          <div class="plan-header">
            <h2>Plan Most to Least</h2>
            <p id="plan-line">0 floors</p>
          </div>
          <div id="floor-list" class="floor-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
